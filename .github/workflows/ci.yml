name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --dev
      - name: Ruff lint
        run: uv run ruff check src tests
      - name: Ruff format
        run: uv run ruff format --check src tests

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - run: uv sync --dev
      # Crawl tests self-skip without a browser; install chromium so they actually run.
      - name: Install Playwright chromium
        run: uv run playwright install --with-deps chromium
      - name: Tests
        run: uv run pytest -q

  types:
    name: Types (advisory)
    runs-on: ubuntu-latest
    # ty is pre-1.0 and currently reports a mix of real None-safety findings and
    # Textual dynamic-dispatch false positives. Advisory until the real ones are
    # burned down and framework noise suppressed, then flip to a blocking gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --dev
      - name: Type check
        run: uv run ty check src
